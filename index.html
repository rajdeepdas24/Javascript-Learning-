<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript Background Color Switcher</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a class="heading-tags" id="home" href="">Home</a>
            <a class="heading-tags" id="ytchannel" href="https://www.youtube.com/@Freeze19">Youtube Channel</a>
        </nav>
    </header>

    <main>
        <div class="canvas">
            <h1 class="heading-tags">Color Scheme Switcher</h1>

            <div class="colors">
                <span class="button" id="white">White</span>
                <span class="button" id="black">Black</span>
                <span class="button" id="blue">Blue</span>
                <span class="button" id="yellow">yellow</span>
                <span class="button" id="green">Green</span>
                <span class="button" id="red">Red</span>
                <span class="button" id="orange">Orange</span>
                <span class="button" id="pink">Pink</span>
            </div>
            
            <h2 class="heading-tags">Try clicking on one of the colors above <br>
                <span>to change the background color of this page!</span>
            </h2>
            
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
